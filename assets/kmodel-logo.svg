<svg width="520" height="140" viewBox="0 0 520 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0F0608"/>
      <stop offset="100%" stop-color="#080305"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="520" height="140" rx="18" fill="url(#mb)"/>

  <!-- K -->
  <g filter="url(#glow)" stroke="#FF2D55" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="42" y1="26" x2="42" y2="114" stroke-width="11"/>
    <line x1="42" y1="70" x2="106" y2="26"  stroke-width="10"/>
    <line x1="42" y1="70" x2="106" y2="114" stroke-width="10"/>
  </g>

  <!-- Divider -->
  <rect x="140" y="28" width="1.5" height="84" rx="0.75" fill="#2A0A0D"/>

  <!-- KMODEL wordmark -->
  <text x="158" y="76"
        font-family="Arial, Helvetica, sans-serif"
        font-size="36" font-weight="900"
        fill="#EFF6FF" letter-spacing="4">KMODEL</text>

  <rect x="158" y="83" width="228" height="2" rx="1" fill="#FF2D55" opacity="0.4"/>

  <text x="159" y="106"
        font-family="Arial, Helvetica, sans-serif"
        font-size="13.5" fill="#3D1219" letter-spacing="0.5">type schema &amp; validation</text>
</svg>
