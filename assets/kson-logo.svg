<svg width="520" height="140" viewBox="0 0 520 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="kg" cx="38%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#0EA5E9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#06111E"/>
      <stop offset="100%" stop-color="#030C18"/>
    </linearGradient>
    <!-- Neon glow filter for tentacle strokes -->
    <filter id="kneon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="520" height="140" rx="18" fill="url(#kb)"/>
  <ellipse cx="66" cy="70" rx="62" ry="56" fill="url(#kg)"/>

  <!-- ── Tentacle K ─────────────────────────────── -->
  <g filter="url(#kneon)">
    <!-- Vertical stroke: slightly wavy S-curve -->
    <path d="M 50 28 C 42 50 60 70 50 112"
          stroke="#38BDF8" stroke-width="16" stroke-linecap="round" fill="none"/>
    <!-- Upper arm: organic curve up-right -->
    <path d="M 50 70 C 65 62 83 50 108 30"
          stroke="#38BDF8" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- Lower arm: organic curve down-right -->
    <path d="M 50 70 C 65 78 83 90 108 110"
          stroke="#38BDF8" stroke-width="14" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Suction cups on vertical stroke (right/inner side) -->
  <circle cx="58" cy="40"  r="4.5" fill="#38BDF8"/>
  <circle cx="58" cy="40"  r="2"   fill="#06111E"/>
  <circle cx="52" cy="56"  r="4.5" fill="#38BDF8"/>
  <circle cx="52" cy="56"  r="2"   fill="#06111E"/>
  <circle cx="59" cy="72"  r="4.5" fill="#38BDF8"/>
  <circle cx="59" cy="72"  r="2"   fill="#06111E"/>
  <circle cx="57" cy="88"  r="4.5" fill="#38BDF8"/>
  <circle cx="57" cy="88"  r="2"   fill="#06111E"/>
  <circle cx="56" cy="103" r="4.5" fill="#38BDF8"/>
  <circle cx="56" cy="103" r="2"   fill="#06111E"/>

  <!-- Suction cups on upper arm (lower edge) -->
  <circle cx="69"  cy="64" r="4" fill="#38BDF8"/>
  <circle cx="69"  cy="64" r="1.8" fill="#06111E"/>
  <circle cx="88"  cy="52" r="4" fill="#38BDF8"/>
  <circle cx="88"  cy="52" r="1.8" fill="#06111E"/>

  <!-- Suction cups on lower arm (upper edge) -->
  <circle cx="69"  cy="76" r="4" fill="#38BDF8"/>
  <circle cx="69"  cy="76" r="1.8" fill="#06111E"/>
  <circle cx="88"  cy="88" r="4" fill="#38BDF8"/>
  <circle cx="88"  cy="88" r="1.8" fill="#06111E"/>

  <!-- Divider -->
  <rect x="140" y="28" width="1.5" height="84" rx="0.75" fill="#0F2540"/>

  <!-- KSON wordmark -->
  <text x="158" y="76"
        font-family="Arial, Helvetica, sans-serif"
        font-size="42" font-weight="900"
        fill="#EFF6FF" letter-spacing="5">KSON</text>

  <rect x="158" y="83" width="196" height="2" rx="1" fill="#38BDF8" opacity="0.35"/>

  <text x="159" y="106"
        font-family="Arial, Helvetica, sans-serif"
        font-size="13.5" fill="#274461" letter-spacing="0.5">type-safe configuration</text>
</svg>
